name: Scheduled Ingestion Cron

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Enable manual run from GitHub Actions UI

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger News Pulse Ingestion
        run: |
          curl -X POST "${{ secrets.API_BASE_URL }}/ingest/trigger" \
            -H "Content-Type: application/json" \
            -d '{"source": "github-actions-cron"}'
